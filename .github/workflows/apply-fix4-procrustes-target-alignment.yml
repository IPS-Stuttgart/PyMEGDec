name: Apply train-class Procrustes target-alignment fix

on:
  push:
    branches:
      - codex/fix-procrustes-target-alignment

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/fix-procrustes-target-alignment
          fetch-depth: 0
      - name: Apply patch and commit source changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git apply fixes/pymegdec_fix4_procrustes_target_alignment.patch
          rm -f fixes/pymegdec_fix4_procrustes_target_alignment.patch
          rm -f .github/workflows/apply-fix4-procrustes-target-alignment.yml
          rmdir fixes 2>/dev/null || true
          python -m compileall src/pymegdec/stimulus_cross_subject.py tests/test_stimulus_cross_subject.py
          git add -A
          git commit -m "Fix train-class Procrustes target alignment"
          git push origin HEAD:codex/fix-procrustes-target-alignment
