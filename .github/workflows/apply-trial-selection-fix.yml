name: Apply trial selection fix

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-trial-selection-fix.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply seeded trial-selection patch
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          def read(path):
              return Path(path).read_text(encoding="utf-8")

          def write(path, text):
              Path(path).write_text(text, encoding="utf-8")

          def insert_after(text, anchor, insert):
              if insert.strip() in text:
                  return text
              pos = text.index(anchor) + len(anchor)
              return text[:pos] + insert + text[pos:]

          def replace_once(text, old, new):
              if new in text:
                  return text
              if old not in text:
                  raise RuntimeError(f"Missing replacement anchor:\n{old}")
              return text.replace(old, new, 1)

          def replace_after(text, marker, old, new):
              start = text.index(marker)
              pos = text.index(old, start)
              if text[pos:pos + len(new)] == new:
                  return text
              return text[:pos] + new + text[pos + len(old):]

          def replace_between(text, start_marker, end_marker, replacement):
              if replacement.strip() in text:
                  return text
              start = text.index(start_marker)
              end = text.index(end_marker, start)
              return text[:start] + replacement + text[end:]

          core_path = "src/pymegdec/_stimulus_cross_subject_core.py"
          core = read(core_path)
          core = insert_after(
